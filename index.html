<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Blum AVENTOS – Kalkulátor silové třídy</title>

<!-- PWA / iOS home screen -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="AVENTOS">
<meta name="theme-color" content="#111111">
<meta name="mobile-web-app-capable" content="yes">

<!-- iOS ikona – oranžový čtverec s bílým B -->
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect width='180' height='180' rx='40' fill='%23111111'/%3E%3Crect x='20' y='20' width='140' height='140' rx='24' fill='%23FF6600'/%3E%3Ctext x='90' y='125' text-anchor='middle' font-family='Arial Black,sans-serif' font-weight='900' font-size='100' fill='%23111111'%3EB%3C/text%3E%3C/svg%3E">

<!-- Manifest inline -->
<link rel="manifest" href="data:application/manifest+json,%7B%22name%22%3A%22Blum+AVENTOS+Kalkulátor%22%2C%22short_name%22%3A%22AVENTOS%22%2C%22start_url%22%3A%22.%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%23111111%22%2C%22theme_color%22%3A%22%23FF6600%22%7D">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@300;400;500;600&display=swap');

  :root {
    --bg: #111111;
    --surface: #1a1a1a;
    --surface2: #222222;
    --border: #333333;
    --accent: #FF6600;
    --accent2: #FF8533;
    --text: #F5F5F5;
    --muted: #888888;
    --success: #4caf7d;
    --danger: #e05555;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Barlow', sans-serif;
    min-height: 100vh;
    padding: 0 0 60px;
  }

  header {
    background: var(--surface);
    border-bottom: 3px solid var(--accent);
    padding: 18px 24px 14px;
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .blum-logo {
    width: 44px; height: 44px;
    background: var(--accent);
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900; font-size: 20px;
    color: #111111;
    letter-spacing: -1px;
    flex-shrink: 0;
  }

  .header-text h1 {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 22px;
    letter-spacing: 0.5px;
    color: var(--text);
    line-height: 1;
  }

  .header-text p {
    font-size: 12px;
    color: var(--muted);
    margin-top: 3px;
    letter-spacing: 0.3px;
  }

  main {
    max-width: 600px;
    margin: 0 auto;
    padding: 24px 16px 0;
  }

  .section-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 600;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
  }

  .system-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 8px;
    margin-bottom: 24px;
  }

  .sys-btn {
    background: var(--surface);
    border: 2px solid var(--border);
    border-radius: 8px;
    padding: 10px 6px;
    cursor: pointer;
    text-align: center;
    transition: all 0.15s;
    color: var(--muted);
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 0.3px;
  }

  .sys-btn .sys-icon {
    display: block;
    font-size: 18px;
    margin-bottom: 4px;
  }

  .sys-btn:hover { border-color: var(--accent); color: var(--accent); }
  .sys-btn.active { background: var(--accent); border-color: var(--accent); color: #111111; }

  .form-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 20px;
  }

  .form-card h2 {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 16px;
    letter-spacing: 0.5px;
    color: var(--accent2);
    margin-bottom: 16px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--border);
  }

  .field-group { margin-bottom: 16px; }

  .field-group label {
    display: block;
    font-size: 12px;
    font-weight: 500;
    color: var(--muted);
    margin-bottom: 6px;
    letter-spacing: 0.5px;
  }

  .field-group label span { color: var(--accent); font-weight: 600; }

  .input-row { display: flex; gap: 10px; align-items: center; }

  input[type="number"] {
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 7px;
    color: var(--text);
    font-family: 'Barlow', sans-serif;
    font-size: 15px;
    font-weight: 500;
    padding: 9px 12px;
    width: 100%;
    outline: none;
    transition: border-color 0.15s;
    -webkit-appearance: none;
  }

  input[type="number"]:focus { border-color: var(--accent); }

  .unit-tag {
    font-size: 12px;
    color: var(--muted);
    white-space: nowrap;
    min-width: 28px;
  }

  .hint { font-size: 11px; color: var(--muted); margin-top: 5px; }

  .mat-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 8px;
  }

  .mat-btn {
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 7px;
    padding: 8px 6px;
    cursor: pointer;
    text-align: center;
    transition: all 0.15s;
    color: var(--muted);
    font-size: 12px;
    font-weight: 500;
  }

  .mat-btn:hover { border-color: var(--accent); color: var(--text); }
  .mat-btn.active { border-color: var(--accent); background: rgba(255,102,0,0.12); color: var(--accent2); }

  .calc-btn {
    width: 100%;
    background: var(--accent);
    color: #111111;
    border: none;
    border-radius: 10px;
    padding: 14px;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 18px;
    letter-spacing: 1.5px;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
    margin-bottom: 20px;
  }

  .calc-btn:hover { background: var(--accent2); }
  .calc-btn:active { transform: scale(0.99); }

  .result-card {
    background: var(--surface);
    border: 2px solid var(--success);
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 20px;
    display: none;
  }

  .result-card.visible { display: block; }
  .result-card.error { border-color: var(--danger); }

  .result-header {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--success);
    margin-bottom: 12px;
  }

  .result-card.error .result-header { color: var(--danger); }

  .result-main {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 32px;
    font-weight: 900;
    color: var(--text);
    line-height: 1.1;
    margin-bottom: 6px;
  }

  .result-code {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 18px;
    font-weight: 500;
    color: var(--accent2);
    letter-spacing: 0.5px;
    margin-bottom: 12px;
  }

  .result-detail {
    font-size: 12px;
    color: var(--muted);
    line-height: 1.7;
    border-top: 1px solid var(--border);
    padding-top: 10px;
  }

  .pf-badge {
    display: inline-block;
    background: rgba(255,102,0,0.15);
    border: 1px solid var(--accent);
    border-radius: 5px;
    padding: 2px 8px;
    font-size: 12px;
    color: var(--accent2);
    font-weight: 600;
    margin-top: 8px;
  }

  .warning-badge {
    display: inline-block;
    background: rgba(224,85,85,0.1);
    border: 1px solid var(--danger);
    border-radius: 5px;
    padding: 4px 10px;
    font-size: 12px;
    color: #f08080;
    margin-top: 8px;
  }

  .info-box {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-left: 3px solid var(--accent);
    border-radius: 8px;
    padding: 12px 14px;
    font-size: 12px;
    color: var(--muted);
    line-height: 1.6;
    margin-bottom: 20px;
    display: none;
  }

  .info-box.visible { display: block; }
  .info-box strong { color: var(--accent2); }

  .no-system {
    text-align: center;
    padding: 40px 20px;
    color: var(--muted);
    font-size: 14px;
  }

  .no-system .icon { font-size: 48px; margin-bottom: 12px; display: block; }

  .divider { height: 1px; background: var(--border); margin: 4px 0 16px; }

  .hidden { display: none !important; }
</style>
</head>
<body>

<header>
  <div class="blum-logo">B</div>
  <div class="header-text">
    <h1>AVENTOS Kalkulátor</h1>
    <p>Výběr silové třídy zdvihacích mechanismů</p>
  </div>
</header>

<main>

  <div class="section-label" style="margin-top:20px">Vyberte typ zdvihu</div>
  <div class="system-grid">
    <button class="sys-btn" onclick="selectSystem('HF')" id="btn-HF">
      <span class="sys-icon">⬆️</span>HF top
    </button>
    <button class="sys-btn" onclick="selectSystem('HS')" id="btn-HS">
      <span class="sys-icon">↗️</span>HS top
    </button>
    <button class="sys-btn" onclick="selectSystem('HL')" id="btn-HL">
      <span class="sys-icon">⬆️</span>HL top
    </button>
    <button class="sys-btn" onclick="selectSystem('HK')" id="btn-HK">
      <span class="sys-icon">↕️</span>HK top
    </button>
    <button class="sys-btn" onclick="selectSystem('HKS')" id="btn-HKS">
      <span class="sys-icon">↕️</span>HK-S
    </button>
  </div>

  <div class="no-system" id="no-system">
    <span class="icon">🔧</span>
    Vyberte typ zdvihu výše a zadejte parametry skříňky
  </div>

  <div id="form-area" class="hidden">

    <div class="info-box" id="system-info"></div>

    <div class="form-card">
      <h2>Parametry skříňky a dveří</h2>

      <div class="field-group">
        <label>Výška korpusu <span id="height-range"></span></label>
        <div class="input-row">
          <input type="number" inputmode="decimal" id="input-height" placeholder="napr. 600" min="150" max="1200">
          <span class="unit-tag">mm</span>
        </div>
      </div>

      <div class="field-group">
        <label>Šířka korpusu <span id="width-range"></span></label>
        <div class="input-row">
          <input type="number" inputmode="decimal" id="input-width" placeholder="napr. 800" min="200" max="1800">
          <span class="unit-tag">mm</span>
        </div>
      </div>

      <div class="field-group">
        <label>Tloušťka dveří</label>
        <div class="input-row">
          <input type="number" inputmode="decimal" id="input-thickness" placeholder="19" value="19" min="8" max="30">
          <span class="unit-tag">mm</span>
        </div>
      </div>

      <div class="divider"></div>

      <div class="field-group">
        <label>Materiál dveří</label>
        <div class="mat-grid">
          <button class="mat-btn active" id="mat-dsp" onclick="setMaterial('DSP')">DSP<br><small>680 kg/m³</small></button>
          <button class="mat-btn" id="mat-mdf" onclick="setMaterial('MDF')">MDF<br><small>760 kg/m³</small></button>
          <button class="mat-btn" id="mat-custom" onclick="setMaterial('CUSTOM')">Vlastní hmotnost</button>
        </div>
      </div>

      <div class="field-group" id="field-custom-weight" style="display:none">
        <label>Hmotnost dveří (bez madla)</label>
        <div class="input-row">
          <input type="number" inputmode="decimal" id="input-custom-weight" placeholder="napr. 4.5" step="0.1" min="0">
          <span class="unit-tag">kg</span>
        </div>
      </div>

      <div class="field-group">
        <label>Hmotnost madla <span style="color:var(--muted);font-weight:400">(jedno)</span></label>
        <div class="input-row">
          <input type="number" inputmode="decimal" id="input-handle" placeholder="0" value="0" step="0.1" min="0">
          <span class="unit-tag">kg</span>
        </div>
        <div class="hint" id="handle-hint">Pro HF/HS/HL: +1× madlo. Pro HK/HK-S: +2× madlo.</div>
      </div>

    </div>

    <button class="calc-btn" onclick="calculate()">▶ VYPOČÍTAT SILOVOU TŘÍDU</button>

  </div>

  <div class="result-card" id="result-card">
    <div class="result-header" id="result-header">✓ VÝSLEDEK</div>
    <div class="result-main" id="result-main"></div>
    <div class="result-code" id="result-code"></div>
    <div class="result-detail" id="result-detail"></div>
  </div>

</main>

<script>
const SYSTEMS = {
  HF: {
    name: 'AVENTOS HF top',
    desc: 'Skládací zdvih – dvě části dveří se skládají nahoru. Pro vysoké skříňky 480–1200 mm.',
    heightMin: 480, heightMax: 1200,
    widthMin: 400, widthMax: 1800,
    handleMultiplier: 1,
    mechanisms: [
      { pf_min: 960,  pf_max: 5500,  name: 'Silová třída 22 (slabá)',   code: '20F2201' },
      { pf_min: 5350, pf_max: 10150, name: 'Silová třída 25 (střední)', code: '20F2501' },
      { pf_min: 9000, pf_max: 25900, name: 'Silová třída 28 (silná)',   code: '20F2801' },
    ],
    note: 'Potřebujete také teleskopická ramena (dle výšky korpusu) a krytky. PF = výška [mm] × hmotnost dveří vč. 1× madla [kg].'
  },
  HS: {
    name: 'AVENTOS HS top',
    desc: 'Zdvih šikmo dopředu a nahoru – celé dveře se vykloní. Ideální pro velké jednodílné dveře.',
    heightMin: 350, heightMax: 800,
    widthMin: 450, widthMax: 1800,
    handleMultiplier: 1,
    mechanisms: [
      { h_min: 350, h_max: 540, w_min: 2,    w_max: 12.5,  name: 'Silová třída 22 (slabá)',   code: '22S2201' },
      { h_min: 480, h_max: 660, w_min: 2.75, w_max: 15.25, name: 'Silová třída 25 (střední)', code: '22S2501' },
      { h_min: 650, h_max: 800, w_min: 3.5,  w_max: 18.5,  name: 'Silová třída 28 (silná)',   code: '22S2801' },
    ],
    note: 'Ramena: 22S3501 (350–800 mm). PF = výška [mm] × hmotnost dveří vč. 1× madla [kg].'
  },
  HL: {
    name: 'AVENTOS HL top',
    desc: 'Celé dveře se zdvihají vodorovně nahoru. Pro střední a vyšší skříňky 350–800 mm.',
    heightMin: 350, heightMax: 800,
    widthMin: 450, widthMax: 1800,
    handleMultiplier: 1,
    mechanisms: [
      { pf_min: 400,  pf_max: 2600,  name: 'Silová třída 15 (slabá)',   code: '20L2101' },
      { pf_min: 2400, pf_max: 6200,  name: 'Silová třída 25 (střední)', code: '20L2301' },
      { pf_min: 5600, pf_max: 14500, name: 'Silová třída 40 (silná)',   code: '20L2601' },
    ],
    note: 'PF = výška [mm] × hmotnost dveří vč. 1× madla [kg].'
  },
  HK: {
    name: 'AVENTOS HK top',
    desc: 'Kompaktní zdvih – dveře se vyklopí nahoru a zůstanou otevřené. Výška korpusu 205–610 mm.',
    heightMin: 205, heightMax: 610,
    widthMin: 381, widthMax: 1828,
    handleMultiplier: 2,
    mechanisms: [
      { pf_min: 400,  pf_max: 1400, name: 'Silová třída 23 (nejslabší)', code: '22K2300' },
      { pf_min: 930,  pf_max: 2800, name: 'Silová třída 25 (slabá)',     code: '22K2500' },
      { pf_min: 1700, pf_max: 5000, name: 'Silová třída 27 (střední)',   code: '22K2700' },
      { pf_min: 3200, pf_max: 9000, name: 'Silová třída 29 (silná)',     code: '22K2900' },
    ],
    note: 'PF = výška [mm] × hmotnost dveří vč. 2× madla [kg]. Max. 18 kg dveře na 2 mechanismy.'
  },
  HKS: {
    name: 'AVENTOS HK-S',
    desc: 'Kompaktní zdvih pro malé skříňky a vestavěné aplikace. Výška korpusu 186–610 mm.',
    heightMin: 186, heightMax: 610,
    widthMin: 300, widthMax: 1828,
    handleMultiplier: 2,
    mechanisms: [
      { pf_min: 200,  pf_max: 1200, name: 'Silová třída 10 (nejslabší)', code: '20S2B01.10' },
      { pf_min: 700,  pf_max: 2500, name: 'Silová třída 23 (slabá)',     code: '20S2B01.23' },
      { pf_min: 1800, pf_max: 6000, name: 'Silová třída 45 (silná)',     code: '20S2B01.45' },
    ],
    note: 'PF = výška [mm] × hmotnost dveří vč. 2× madla [kg].'
  }
};

const DENSITY = { DSP: 680, MDF: 760 };
let currentSystem = null;
let currentMaterial = 'DSP';

function selectSystem(sys) {
  currentSystem = sys;
  document.querySelectorAll('.sys-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('btn-' + sys).classList.add('active');
  const S = SYSTEMS[sys];
  document.getElementById('no-system').classList.add('hidden');
  document.getElementById('form-area').classList.remove('hidden');
  const info = document.getElementById('system-info');
  info.innerHTML = `<strong>${S.name}</strong> – ${S.desc}`;
  info.classList.add('visible');
  document.getElementById('height-range').textContent = `(${S.heightMin}–${S.heightMax} mm)`;
  document.getElementById('width-range').textContent  = `(${S.widthMin}–${S.widthMax} mm)`;
  document.getElementById('handle-hint').textContent  = (sys === 'HK' || sys === 'HKS')
    ? 'Pro HK/HK-S: přičítají se 2× madlo (obě strany dveří).'
    : 'Pro HF/HS/HL: přičítá se 1× madlo.';
  hideResult();
}

function setMaterial(mat) {
  currentMaterial = mat;
  document.querySelectorAll('.mat-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('mat-' + mat.toLowerCase()).classList.add('active');
  document.getElementById('field-custom-weight').style.display = mat === 'CUSTOM' ? 'block' : 'none';
}

function hideResult() {
  document.getElementById('result-card').classList.remove('visible', 'error');
}

function calcWeight() {
  const h = parseFloat(document.getElementById('input-height').value);
  const w = parseFloat(document.getElementById('input-width').value);
  const t = parseFloat(document.getElementById('input-thickness').value) || 19;
  if (currentMaterial === 'CUSTOM') {
    const cw = parseFloat(document.getElementById('input-custom-weight').value);
    return (isNaN(cw) || cw <= 0) ? null : cw;
  }
  return (h / 1000) * (w / 1000) * (t / 1000) * (DENSITY[currentMaterial] || 680);
}

function findMechanism(S, pf, height, weight) {
  if (S.mechanisms[0].h_min !== undefined) {
    const c = S.mechanisms.filter(m => height >= m.h_min && height <= m.h_max && weight >= m.w_min && weight <= m.w_max);
    return c.length ? c[0] : null;
  }
  const c = S.mechanisms.filter(m => pf >= m.pf_min && pf <= m.pf_max);
  return c.length ? c[0] : null;
}

function calculate() {
  if (!currentSystem) return;
  const S = SYSTEMS[currentSystem];
  const height = parseFloat(document.getElementById('input-height').value);
  const width  = parseFloat(document.getElementById('input-width').value);
  const handle = parseFloat(document.getElementById('input-handle').value) || 0;
  const t      = parseFloat(document.getElementById('input-thickness').value) || 19;

  if (isNaN(height) || isNaN(width)) { showError('Vyplňte prosím výšku a šířku korpusu.'); return; }
  if (height < S.heightMin || height > S.heightMax) {
    showError(`Výška korpusu mimo rozsah pro ${S.name}.\nPovoleno: ${S.heightMin}–${S.heightMax} mm.`); return;
  }
  if (width < S.widthMin || width > S.widthMax) {
    showError(`Šířka korpusu mimo rozsah pro ${S.name}.\nPovoleno: ${S.widthMin}–${S.widthMax} mm.`); return;
  }

  const doorWeight = calcWeight();
  if (doorWeight === null || isNaN(doorWeight)) { showError('Zadejte platné rozměry nebo hmotnost dveří.'); return; }

  const handleTotal = handle * S.handleMultiplier;
  const totalWeight = doorWeight + handleTotal;
  const pf   = height * totalWeight;
  const mech = findMechanism(S, pf, height, totalWeight);

  const rc  = document.getElementById('result-card');
  const rh  = document.getElementById('result-header');
  const rm  = document.getElementById('result-main');
  const rco = document.getElementById('result-code');
  const rd  = document.getElementById('result-detail');

  if (!mech) {
    rc.classList.add('visible', 'error');
    rh.innerHTML  = '⚠ MIMO ROZSAH';
    rm.innerHTML  = 'Dveře jsou příliš těžké nebo rozměry neodpovídají';
    rco.innerHTML = '';
    rd.innerHTML  = `Hmotnost dveří: <strong>${doorWeight.toFixed(2)} kg</strong><br>
      Celková hmotnost (vč. madel): <strong>${totalWeight.toFixed(2)} kg</strong><br><br>
      Power factor: <strong>${Math.round(pf)}</strong><br><br>
      Tato kombinace přesahuje rozsah dostupných silových tříd pro ${S.name}.<br>
      Ověřte rozměry nebo zvažte jiný typ zdvihu.`;
    return;
  }

  rc.classList.remove('error');
  rc.classList.add('visible');
  rh.innerHTML  = '✓ DOPORUČENÁ SILOVÁ TŘÍDA';
  rm.innerHTML  = mech.name;
  rco.innerHTML = `Obj. číslo: <strong>${mech.code}</strong>`;

  const pfNote   = mech.pf_min !== undefined
    ? `<div class="pf-badge">PF = ${Math.round(pf)} (rozsah: ${mech.pf_min}–${mech.pf_max})</div>` : '';
  const wideNote = width > 1200
    ? `<div class="warning-badge">⚠ Šířka > 1 200 mm: doporučen 3. mechanismus na střed dveří (zabrání průhybu)</div>` : '';

  rd.innerHTML = `Dveře (${t} mm ${currentMaterial}): <strong>${doorWeight.toFixed(2)} kg</strong><br>
    Madla (${S.handleMultiplier}× × ${handle} kg): <strong>${handleTotal.toFixed(2)} kg</strong><br>
    Celková hmotnost dveří: <strong>${totalWeight.toFixed(2)} kg</strong><br><br>
    ${pfNote}${wideNote}
    <br><em style="color:var(--muted);font-size:11px">${S.note}</em>`;
}

function showError(msg) {
  const rc = document.getElementById('result-card');
  rc.classList.add('visible', 'error');
  document.getElementById('result-header').innerHTML = '⚠ CHYBA VSTUPU';
  document.getElementById('result-main').innerHTML   = msg.replace('\n', '<br>');
  document.getElementById('result-code').innerHTML   = '';
  document.getElementById('result-detail').innerHTML = '';
}

// Service worker pro offline režim
if ('serviceWorker' in navigator) {
  const swCode = `
    const CACHE = 'aventos-v1';
    self.addEventListener('install', e => {
      self.skipWaiting();
    });
    self.addEventListener('fetch', e => {
      e.respondWith(fetch(e.request).catch(() => new Response('Offline')));
    });
  `;
  const blob = new Blob([swCode], { type: 'application/javascript' });
  const swUrl = URL.createObjectURL(blob);
  navigator.serviceWorker.register(swUrl).catch(() => {});
}
</script>
